version: '3.1'

services:
    nest:
      image: gabrielsougri/sistema-delivery:latest
      restart: always
      ports:
        - '3000:3000'
      volumes:
        - .:/app
      environment: 
        DATABASE_URL: postgresql://postgres:09072001ga@localhost:5432/delivery?schema=public
      depends_on:  
        - postgres
    postgres:
      image: postgres:17.5-alpine3.20
      restart: always
      volumes:
        - db_data:/var/lib/postgresql/data
      ports: 
        - '5432:5432'
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: 09072001ga
        POSTGRES_DB: delivery
volumes:
    db_data: